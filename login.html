<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PMO 登录</title>
<style>
:root {
  --bg: #f5f6fa; --card: #ffffff; --border: #e9ecf2; --text: #2c3e50;
  --text-secondary: #7f8c9b; --primary: #4f6ef7; --primary-light: #eef1fd;
  --success: #22c55e; --danger: #ef4444; --danger-bg: #fef2f2;
  --radius: 10px; --shadow: 0 1px 3px rgba(0,0,0,0.04);
  --shadow-lg: 0 4px 16px rgba(0,0,0,0.08);
  --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg); color: var(--text); min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  -webkit-font-smoothing: antialiased;
}
.card {
  background: var(--card); border-radius: 14px; box-shadow: var(--shadow-lg);
  padding: 40px 36px; width: 400px; max-width: 94vw;
  border: 1px solid var(--border);
}
.logo-area { text-align: center; margin-bottom: 28px; }
.logo {
  width: 52px; height: 52px; border-radius: 12px;
  background: linear-gradient(135deg, #4f6ef7, #6366f1);
  display: inline-flex; align-items: center; justify-content: center;
  color: #fff; font-size: 24px; margin-bottom: 8px;
}
.logo-area h1 { font-size: 18px; font-weight: 700; }
.logo-area p { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

.form-panel { display: none; }
.form-panel.active { display: block; }

.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 11px; font-weight: 600; color: var(--text-secondary); margin-bottom: 5px; letter-spacing: 0.3px; }
.form-group input {
  width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 7px;
  font-size: 14px; font-family: inherit; outline: none; transition: var(--transition);
  background: #fafbfc;
}
.form-group input:focus { border-color: var(--primary); background: #fff; box-shadow: 0 0 0 3px rgba(79,110,247,0.08); }
.form-group input.error { border-color: var(--danger); }

.btn { width: 100%; padding: 11px; border-radius: 7px; font-size: 14px; font-weight: 600;
  cursor: pointer; border: none; transition: var(--transition); font-family: inherit; }
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: #3d5ce5; }
.btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

.error-msg { color: var(--danger); font-size: 12px; margin-top: 10px; text-align: center; min-height: 18px; }
.success-msg { color: var(--success); font-size: 12px; margin-top: 10px; text-align: center; min-height: 18px; }

.footer-text { text-align: center; margin-top: 20px; font-size: 12px; color: var(--text-secondary); }

.setup-note {
  background: var(--primary-light); border: 1px solid #c8d3fc;
  border-radius: var(--radius); padding: 12px; margin-bottom: 20px;
  font-size: 13px; color: var(--primary); text-align: center;
}
</style>
<script src="js/db-core.js"></script>
<script src="js/auth.js"></script>
</head>
<body>
<div class="card">
  <div class="logo-area">
    <div class="logo">📋</div>
    <h1>PMO 项目管理看板</h1>
    <p id="panelSubtitle">请登录以继续</p>
  </div>

  <!-- First-run Setup Panel -->
  <div class="form-panel" id="panelSetup">
    <div class="setup-note">🔐 首次启动 · 创建管理员账号</div>
    <div class="form-group">
      <label>管理员用户名</label>
      <input type="text" id="setupUsername" placeholder="请输入管理员用户名" autocomplete="off">
    </div>
    <div class="form-group">
      <label>密码</label>
      <input type="password" id="setupPassword" placeholder="至少6位密码" autocomplete="new-password">
    </div>
    <div class="form-group">
      <label>确认密码</label>
      <input type="password" id="setupConfirmPassword" placeholder="再次输入密码" autocomplete="new-password">
    </div>
    <button class="btn btn-primary" onclick="handleSetup()" id="setupBtn">初始化系统</button>
    <div class="error-msg" id="setupError"></div>
  </div>

  <!-- Login Form -->
  <div class="form-panel active" id="panelLogin">
    <div class="form-group">
      <label>用户名</label>
      <input type="text" id="loginUsername" placeholder="请输入管理员分配的账号" autocomplete="username">
    </div>
    <div class="form-group">
      <label>密码</label>
      <input type="password" id="loginPassword" placeholder="请输入密码" autocomplete="current-password">
    </div>
    <button class="btn btn-primary" onclick="handleLogin()" id="loginBtn">登 录</button>
    <div class="error-msg" id="loginError"></div>
    <div class="error-msg" id="lockoutMsg" style="display:none;background:var(--danger-bg);padding:8px;border-radius:6px;margin-top:8px;"></div>
  </div>

  <div class="footer-text" id="footerText">没有账号？请联系管理员</div>
</div>

<script>
(function() {
  'use strict';

  /* ==================== Guard ==================== */
  // If already logged in, redirect based on role
  const existingSession = getSession();
  if (existingSession) {
    window.location.href = (existingSession.role === 'admin') ? 'admin/' : 'index.html';
  }

  /* ==================== First-run detection ==================== */
  async function checkFirstRun() {
    try {
      const first = await isFirstRun();
      if (first) {
        document.getElementById('panelLogin').classList.remove('active');
        document.getElementById('panelSetup').classList.add('active');
        document.getElementById('panelSubtitle').textContent = '首次启动 — 创建管理员账号';
        document.getElementById('footerText').textContent = 'PMO 账号管理系统 v2.0';
      }
    } catch(e) {
      console.warn('isFirstRun check failed:', e);
    }
  }
  checkFirstRun();

  /* ==================== Setup (First-run) ==================== */
  window.handleSetup = async function() {
    const username = document.getElementById('setupUsername').value.trim();
    const password = document.getElementById('setupPassword').value;
    const confirmPassword = document.getElementById('setupConfirmPassword').value;
    const errEl = document.getElementById('setupError');
    const btn = document.getElementById('setupBtn');

    errEl.textContent = '';
    if (!username) { errEl.textContent = '请输入管理员用户名'; return; }
    if (!password) { errEl.textContent = '请输入密码'; return; }
    if (password.length < 6) { errEl.textContent = '密码至少6位'; return; }
    if (password !== confirmPassword) { errEl.textContent = '两次密码输入不一致'; return; }

    btn.disabled = true;
    btn.textContent = '初始化中...';

    try {
      await initAdminAccount(username, password);
      // Switch to login
      document.getElementById('panelSetup').classList.remove('active');
      document.getElementById('panelLogin').classList.add('active');
      document.getElementById('panelSubtitle').textContent = '管理员账号已创建，请登录';
      document.getElementById('loginUsername').value = username;
      document.getElementById('loginPassword').focus();
    } catch(e) {
      errEl.textContent = e.message || '初始化失败';
    } finally {
      btn.disabled = false;
      btn.textContent = '初始化系统';
    }
  };

  /* ==================== Login ==================== */
  window.handleLogin = async function() {
    const username = document.getElementById('loginUsername').value.trim();
    const password = document.getElementById('loginPassword').value;
    const errEl = document.getElementById('loginError');
    const btn = document.getElementById('loginBtn');

    errEl.textContent = '';
    if (!username || !password) {
      errEl.textContent = '请输入用户名和密码';
      return;
    }

    btn.disabled = true;
    btn.textContent = '登录中...';

    // ── Lockout check ──
    const lockState = getLockState(username);
    if (lockState.locked) {
      const mins = Math.ceil(lockState.waitSeconds / 60);
      document.getElementById('lockoutMsg').style.display = 'block';
      document.getElementById('lockoutMsg').textContent = '⏳ 账号已锁定，请 ' + mins + ' 分钟后再试';
      btn.disabled = false;
      btn.textContent = '登 录';
      return;
    }
    document.getElementById('lockoutMsg').style.display = 'none';

    try {
      const session = await login(username, password);
      window.location.href = (session.role === 'admin') ? 'admin/' : 'index.html';
    } catch(e) {
      errEl.textContent = e.message || '登录失败';
      btn.disabled = false;
      btn.textContent = '登 录';
    }
  };

  /* ==================== Enter key support ==================== */
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      if (document.getElementById('panelSetup').classList.contains('active')) {
        handleSetup();
      } else if (document.getElementById('panelLogin').classList.contains('active')) {
        handleLogin();
      }
    }
  });

})();
</script>
</body>
</html>
